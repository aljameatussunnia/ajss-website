<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Panel — AJSS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --g0: #071510;
  --g1: #0c1f15;
  --g2: #122a1c;
  --g3: #1a3a27;
  --gold:  #c9a84c;
  --gold2: #e0bf6e;
  --gold3: #f0d896;
  --tw:  rgba(255,255,255,0.92);
  --tm:  rgba(255,255,255,0.65);
  --tl:  rgba(255,255,255,0.38);
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(201,168,76,0.18);
  --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--g0);
  color: var(--tw);
  min-height: 100vh;
  padding: 24px 16px 60px;
}
.wrap { max-width: 720px; margin: 0 auto; }
h1, h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
}
.center-screen {
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: linear-gradient(135deg, rgba(26,58,39,0.7), rgba(12,31,21,0.9));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 44px 32px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.login-card h1 { font-size: 1.7rem; color: var(--gold2); margin-bottom: 6px; }
.login-card p { color: var(--tm); font-size: 0.95rem; margin-bottom: 24px; }
.pw-input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 10px;
  border: 1px solid rgba(201,168,76,0.3);
  background: rgba(0,0,0,0.25);
  color: var(--tw);
  font-size: 1rem;
  font-family: inherit;
  margin-bottom: 16px;
  outline: none;
}
.pw-input:focus { border-color: var(--gold2); }
.btn-gold {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #1a1200;
  font-weight: 700;
  font-size: 1rem;
  font-family: inherit;
  cursor: pointer;
}
.error-msg { color: #ff8080; font-size: 0.88rem; margin-top: 12px; min-height: 18px; }

.dashboard { display: none; }
.dash-header {
  text-align: center;
  margin-bottom: 36px;
}
.dash-header h1 { font-size: 2rem; color: var(--gold2); margin-bottom: 8px; }
.dash-header p { color: var(--tm); font-size: 0.95rem; }
.year-block {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 26px;
}
.year-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  color: var(--gold2);
  margin-bottom: 4px;
}
.year-count { color: var(--tl); font-size: 0.85rem; margin-bottom: 18px; }
.student-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.student-row:first-of-type { border-top: none; }
.student-name { color: var(--tw); font-size: 1.05rem; }
.dl-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 8px;
  background: rgba(201,168,76,0.14);
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold3);
  text-decoration: none;
  font-size: 0.85rem;
  font-family: inherit;
  white-space: nowrap;
}
.logout-btn {
  display: block;
  margin: 30px auto 0;
  padding: 10px 22px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--tm);
  font-family: inherit;
  cursor: pointer;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="center-screen" id="loginScreen">
    <div class="login-card">
      <h1>Admin Access</h1>
      <p>Enter password to view all examination results</p>
      <input type="password" class="pw-input" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter'){tryLogin();}">
      <button class="btn-gold" onclick="tryLogin()">Login</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <h1>Examination Results — Admin</h1>
      <p>All published results, organised year-wise</p>
    </div>
    <div id="yearBlocks"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<script>
/* ======================================================
   ADMIN PANEL PASSWORD
   ------------------------------------------------------
   Change the password by editing the line below.
   NOTE: This is a basic client-side gate only — it stops
   casual visitors, but is not true secure authentication
   since this is a static site with no server/database.
====================================================== */
const ADMIN_PASSWORD = "@AdminAjss";

/* ======================================================
   STUDENT RESULT DATA (kept identical to index.html)
   ------------------------------------------------------
   IMPORTANT: Whenever students are added/updated in
   index.html's studentResultsByYear, the same data must
   be copied here too, so the admin panel stays in sync.
====================================================== */
const studentResultsByYear = {
  "2026": {
    label: "M.M Final Examination 2026",
    students: [
      { name: "Md Masud Ahmed Laskar", file: "./Masud Ahmed Laskar.jpg" },
      { name: "Makbul Ali", file: "./Makbul Ali.jpg" },
      { name: "Jomir Uddin", file: "./Jomir Uddin.jpg" },
      { name: "Md Kamal Uddin", file: "./Kamal Uddin.jpg" },
      { name: "Shahin Ahmed", file: "./Shahin Ahmed.jpg" },
      { name: "Md Najibur Rahman Barbhuiya", file: "./Najibur Rahman.jpg" },
      { name: "Abdul Hannan Barbhuiya", file: "./Abdul Hannan.jpg" },
      { name: "Hussain Ahmed Laskar", file: "./Hussain Ahmed.jpg" },
      { name: "Noor Ahmed Tapadar", file: "./Noor Ahmed.jpg" },
    ]
  },
  // Add future years here, e.g. "2027": { label: "...", students: [...] },
};

function tryLogin() {
  const input = document.getElementById('pwInput');
  const errorMsg = document.getElementById('errorMsg');
  if (input.value === ADMIN_PASSWORD) {
    sessionStorage.setItem('ajss_admin_ok', 'yes');
    showDashboard();
  } else {
    errorMsg.textContent = 'Incorrect password. Please try again.';
    input.value = '';
  }
}

function logout() {
  sessionStorage.removeItem('ajss_admin_ok');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  const dashboard = document.getElementById('dashboard');
  dashboard.style.display = 'block';

  const years = Object.keys(studentResultsByYear).sort((a, b) => b.localeCompare(a));
  const container = document.getElementById('yearBlocks');
  container.innerHTML = years.map(y => {
    const batch = studentResultsByYear[y];
    const rows = batch.students.map(s => `
      <div class="student-row">
        <span class="student-name">${s.name.replace(/</g,'&lt;')}</span>
        <a class="dl-btn" href="${s.file}" download="${s.name.replace(/</g,'&lt;')} Marksheet.jpg" target="_blank">Download</a>
      </div>
    `).join('');
    return `
      <div class="year-block">
        <div class="year-title">${batch.label.replace(/</g,'&lt;')}</div>
        <div class="year-count">${batch.students.length} student${batch.students.length === 1 ? '' : 's'}</div>
        ${rows}
      </div>
    `;
  }).join('');
}

// Stay logged in during the session (until tab/browser is closed)
if (sessionStorage.getItem('ajss_admin_ok') === 'yes') {
  showDashboard();
}
</script>
</body>
</html>
